name: APIGATE DevSecOps CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  security-scans:
    name: SAST & Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # 1. Secret Scanning: Prevents hardcoded API keys from leaking
      - name: Gitleaks Secret Scan
        uses: zricethezav/gitleaks-action@v2
        
      # 2. SAST: Semgrep finds complex logic flaws in Python/FastAPI
      - name: Semgrep Static Analysis
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/python"
  dependency-testing:
    name: SCA & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
        
      # 3. SCA: Safety checks if your PyPI packages have known CVEs
      - name: Dependency Vulnerability Scan (Safety)
        run: safety check
        
      - name: Run Pytest
        run: pytest tests/
